name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    # Skip on draft PRs so iteration doesn't burn CI; runs on ready_for_review and pushes to main.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Server import check
        run: uv run python -c "from kanka import server; print('OK')"

      - name: Byte-compile every module
        run: uv run python -m compileall -q kanka
